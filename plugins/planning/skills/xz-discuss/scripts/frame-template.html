<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>XZ Planning - 讨论计划</title>
  <style>
    /*
     * XZ DISCUSS 可视化框架模板
     *
     * 提供统一的页面框架：
     * - 自适应系统深色/浅色主题
     * - 固定头部和底部选择指示栏
     * - 可滚动主内容区
     * - 常用 UI 模式的 CSS 辅助类
     *
     * 内容通过 #claude-content 中的占位注释注入。
     */

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    /* ===== 主题变量 ===== */
    :root {
      --bg-primary: #fafafa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f0f0f2;
      --border: #e0e0e5;
      --border-light: #ebebf0;
      --text-primary: #1a1a2e;
      --text-secondary: #6b7280;
      --text-tertiary: #9ca3af;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-light: rgba(99, 102, 241, 0.08);
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --selected-bg: rgba(99, 102, 241, 0.08);
      --selected-border: #6366f1;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #0f0f14;
        --bg-secondary: #1a1a24;
        --bg-tertiary: #252530;
        --border: #2d2d3a;
        --border-light: #363645;
        --text-primary: #e8e8ed;
        --text-secondary: #9ca3af;
        --text-tertiary: #6b7280;
        --accent: #818cf8;
        --accent-hover: #a5b4fc;
        --accent-light: rgba(129, 140, 248, 0.1);
        --selected-bg: rgba(129, 140, 248, 0.12);
        --selected-border: #818cf8;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.4);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== 页面框架 ===== */
    .header {
      background: var(--bg-secondary);
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      backdrop-filter: blur(12px);
    }
    .header h1 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }
    .header .badge {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-light);
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      margin-left: 0.5rem;
    }
    .header .status {
      font-size: 0.7rem;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .header .status::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .main { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .main::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

    #claude-content { padding: 2rem; min-height: 100%; max-width: 960px; margin: 0 auto; }

    .indicator-bar {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 0.6rem 1.5rem;
      flex-shrink: 0;
      text-align: center;
    }
    .indicator-bar span {
      font-size: 0.75rem;
      color: var(--text-tertiary);
    }
    .indicator-bar .selected-text {
      color: var(--accent);
      font-weight: 600;
    }

    /* ===== 排版 ===== */
    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }
    h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .subtitle {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    .section { margin-bottom: 2rem; }
    .label {
      font-size: 0.65rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    /* ===== 选项（A/B/C 选择） ===== */
    .options { display: flex; flex-direction: column; gap: 0.75rem; }
    .option {
      background: var(--bg-secondary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      box-shadow: var(--shadow-sm);
    }
    .option:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .option.selected {
      background: var(--selected-bg);
      border-color: var(--selected-border);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    .option .letter {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      width: 2rem;
      height: 2rem;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    .option.selected .letter {
      background: var(--accent);
      color: white;
    }
    .option .content { flex: 1; }
    .option .content h3 { font-size: 0.95rem; margin-bottom: 0.2rem; }
    .option .content p { color: var(--text-secondary); font-size: 0.85rem; margin: 0; line-height: 1.5; }

    /* ===== 卡片 ===== */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .card {
      background: var(--bg-secondary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-sm);
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .card.selected {
      border-color: var(--selected-border);
      border-width: 2px;
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    .card-image {
      background: var(--bg-tertiary);
      aspect-ratio: 16/10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-body { padding: 1rem 1.25rem; }
    .card-body h3 { margin-bottom: 0.3rem; }
    .card-body p { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.5; }

    /* ===== 模拟容器 ===== */
    .mockup {
      background: var(--bg-secondary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-sm);
    }
    .mockup-header {
      background: var(--bg-tertiary);
      padding: 0.6rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .mockup-header::before {
      content: '';
      display: flex;
      gap: 4px;
      width: 36px;
      height: 10px;
      background: radial-gradient(circle at 5px 5px, var(--border) 4px, transparent 4px),
                  radial-gradient(circle at 17px 5px, var(--border) 4px, transparent 4px),
                  radial-gradient(circle at 29px 5px, var(--border) 4px, transparent 4px);
    }
    .mockup-body { padding: 1.5rem; }

    /* ===== 并排对比 ===== */
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 700px) { .split { grid-template-columns: 1fr; } }

    /* ===== 优缺点 ===== */
    .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; }
    @media (max-width: 600px) { .pros-cons { grid-template-columns: 1fr; } }
    .pros, .cons {
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
      border: 1px solid var(--border-light);
    }
    .pros h4 { color: var(--success); font-size: 0.8rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .cons h4 { color: var(--error); font-size: 0.8rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .pros ul, .cons ul { margin-left: 1.25rem; font-size: 0.85rem; color: var(--text-secondary); }
    .pros li, .cons li { margin-bottom: 0.35rem; line-height: 1.5; }

    /* ===== 占位区域 ===== */
    .placeholder {
      background: var(--bg-tertiary);
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 2rem;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.9rem;
    }

    /* ===== 模拟 UI 元素 ===== */
    .mock-nav {
      background: var(--accent);
      color: white;
      padding: 0.75rem 1.25rem;
      display: flex;
      gap: 1.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    }
    .mock-sidebar {
      background: var(--bg-tertiary);
      padding: 1rem;
      min-width: 180px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .mock-content { padding: 1.5rem; flex: 1; }
    .mock-button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .mock-button:hover { background: var(--accent-hover); }
    .mock-input {
      background: var(--bg-primary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.5rem 0.75rem;
      width: 100%;
      color: var(--text-primary);
      font-size: 0.85rem;
      transition: border-color 0.15s ease;
    }
    .mock-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px var(--accent-light); }

    /* ===== 表格 ===== */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.85rem;
    }
    th {
      background: var(--bg-tertiary);
      font-weight: 600;
      text-align: left;
      padding: 0.6rem 1rem;
      border-bottom: 1.5px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    td {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border-light);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--accent-light); }

    /* ===== 标签 ===== */
    .tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }
    .tag.high { background: rgba(239, 68, 68, 0.1); color: var(--error); }
    .tag.mid { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
    .tag.low { background: rgba(16, 185, 129, 0.1); color: var(--success); }
  </style>
</head>
<body>
  <div class="header">
    <h1>XZ Planning<span class="badge">讨论计划</span></h1>
    <div class="status">已连接</div>
  </div>

  <div class="main">
    <div id="claude-content">
      <!-- CONTENT -->
    </div>
  </div>

  <div class="indicator-bar">
    <span id="indicator-text">点击上方选项，然后返回终端继续对话</span>
  </div>

</body>
</html>
